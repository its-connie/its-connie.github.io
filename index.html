  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --deepblue: #093369;
      --ink: #ffffff;
      --muted: #2596be;
      --border: rgba(26,25,21,0.12);
      --hover-overlay: rgba(26,25,21,0.52);
      --font-serif: 'EB Garamond', Georgia, serif;
      --font-mono: 'DM Mono', monospace;
    }

    html, body {
      background: var(--deepblue);
      color: var(--ink);
      font-family: var(--font-serif);
      min-height: 100vh;
    }

    /* ── Layout ── */
    .site-wrapper {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 2.5rem 0 2rem;
      border-bottom: 0.5px solid var(--border);
      margin-bottom: 3rem;
    }

    .nav-name {
      font-family: var(--font-serif);
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: var(--ink);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2.25rem;
      list-style: none;
    }

    .nav-links a {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--ink); }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border: 0.5px solid var(--border);
    }

    .cell {
      position: relative;
      overflow: hidden;
      background: var(--deepblue);
      aspect-ratio: 1 / 1;
    }

    .cell a {
      display: block;
      width: 100%;
      height: 100%;
      text-decoration: none;
    }

    /* Thumbnail image */
    .cell img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    /* Placeholder shown when no image is present */
    .cell-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--deepblue);
    }

    .cell-placeholder svg {
      opacity: 0.18;
      width: 36px;
      height: 36px;
    }

    /* Hover overlay */
    .overlay {
      position: absolute;
      inset: 0;
      background: var(--hover-overlay);
      display: flex;
      align-items: flex-end;
      padding: 1.25rem 1.1rem;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .overlay-title {
      font-family: var(--font-serif);
      font-size: 1rem;
      font-style: italic;
      color: var(--deepblue);
      line-height: 1.3;
      letter-spacing: 0.01em;
    }

    .cell:hover .overlay { opacity: 1; }
    .cell:hover img { transform: scale(1.04); }

    /* ── Footer ── */
    footer {
      margin-top: 3rem;
      padding: 2rem 0 3rem;
      border-top: 0.5px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer span {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    footer a {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover { color: var(--ink); }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      nav { flex-direction: column; gap: 1rem; }
    }
  </style>
</head>
